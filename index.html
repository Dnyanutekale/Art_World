<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtWorld – Artist Painting App</title>
    <meta name="description" content="Explore world-famous paintings, artistic wallpapers, nature photography, and bird imagery in a vibrant, artistic gallery.">
    
    <!-- Google Fonts: Playfair Display for headers, Outfit for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons for a clean, modern look -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="background-blob-container" id="bgBlobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar glass">
        <div class="nav-container">
            <div class="logo">
                <i data-lucide="palette" class="logo-icon"></i>
                <span class="logo-text">ArtWorld</span>
            </div>
            
            <div class="search-container glass">
                <i data-lucide="search"></i>
                <input type="text" id="globalSearch" placeholder="Search art, artists, nature...">
            </div>

            <div class="nav-actions">
                <a href="https://github.com/Dnyanutekale/Art_World" target="_blank" class="icon-btn glass" title="View Source on GitHub">
                    <i data-lucide="github"></i>
                </a>
                <button id="themeToggle" class="icon-btn glass" title="Toggle Theme">
                    <i data-lucide="sun" id="themeIcon"></i>
                </button>
                <div class="mobile-menu-btn" id="mobileMenuBtn">
                    <i data-lucide="menu"></i>
                </div>
            </div>
        </div>
        
        <div class="nav-menu" id="navMenu">
            <a href="#" class="nav-link active" data-section="home">Home</a>
            <a href="#" class="nav-link" data-section="paintings">Paintings</a>
            <a href="#" class="nav-link" data-section="blog">Blog</a>
            <a href="#" class="nav-link" data-section="history">History</a>
            <a href="#" class="nav-link" data-section="geography">Geography</a>
            <a href="#" class="nav-link" data-section="amazon">Amazon Forest</a>
            <a href="#" class="nav-link" data-section="wallpapers">Wallpapers</a>
            <a href="#" class="nav-link" data-section="nature">Nature</a>
            <a href="#" class="nav-link" data-section="birds">Birds</a>
            <a href="#" class="nav-link favorites-link" data-section="favorites">
                <i data-lucide="heart"></i>
            </a>
            <a href="#" class="nav-link" data-section="about">About</a>
        </div>
    </nav>

    <main id="mainContent">
        <!-- Content will be dynamically rendered here -->
        <div class="loader">
            <div class="artist-loader"></div>
        </div>
    </main>

    <footer class="glass">
        <div class="footer-content">
            <div class="footer-logo">ArtWorld</div>
            <p>Appreciate the beauty of art and nature every day.</p>
            <div class="footer-links">
                <a href="#" onclick="navigate('home')">Home</a>
                <a href="#" onclick="navigate('paintings')">Paintings</a>
                <a href="#" onclick="navigate('blog')">Blog</a>
                <a href="#" onclick="navigate('about')">About</a>
                <a href="https://github.com/Dnyanutekale/Art_World" target="_blank" title="GitHub Source">
                    <i data-lucide="github" style="width: 18px; vertical-align: middle;"></i>
                </a>
            </div>
        </div>
        <div class="copyright">
            &copy; 2026 ArtWorld – Artist Painting App. All rights reserved.
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
